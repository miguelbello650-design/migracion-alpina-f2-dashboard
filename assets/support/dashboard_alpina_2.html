function estadoClass(e){ const x=(e||'').toLowerCase().trim();
  if(x.startsWith('cerrado'))return 'estado-chip e-cerrado';
  if(x==='ok')return 'estado-chip e-ok';
  if(x.startsWith('abierto'))return 'estado-chip e-abierto';
  if(x.includes('curso'))return 'estado-chip e-curso';
  if(x.startsWith('seguimiento'))return 'estado-chip e-seguimiento';
  if(x.startsWith('pendiente')||x.startsWith('por recibir')||x.startsWith('en espera'))return 'estado-chip e-pendiente';

function toggleTheme(){ const isLight=document.documentElement.getAttribute('data-theme')==='light'; applyTheme(isLight?'dark':'light'); }
function applyTheme(theme){
  const root=document.documentElement;
  if(theme==='light'){ root.setAttribute('data-theme','light'); document.querySelector('.icon-moon').style.display='none'; document.querySelector('.icon-sun').style.display='block'; document.getElementById('themeLabel').textContent='Oscuro'; }
  else { root.removeAttribute('data-theme'); document.querySelector('.icon-moon').style.display='block'; document.querySelector('.icon-sun').style.display='none'; document.getElementById('themeLabel').textContent='Claro'; }
  renderContent();
}

async function exportPPT(){
  const btn=document.querySelector('.btn-export');
  if(typeof PptxGenJS==='undefined'){ alert('No se pudo cargar la librería de PowerPoint (PptxGenJS). Verifica tu conexión e inténtalo de nuevo.'); return; }
  const orig=btn.innerHTML; btn.disabled=true; btn.style.opacity='0.7'; btn.innerHTML='Generando PPTX…';
  try{ await buildPPTX(); }
  catch(err){ console.error(err); alert('Error al generar PPTX:\n\n'+(err&&err.message?err.message:err)); }
  finally{ btn.disabled=false; btn.style.opacity='1'; btn.innerHTML=orig; }
}

async function buildPPTX(){
  const pptx=new PptxGenJS();
  pptx.layout='LAYOUT_WIDE';
  pptx.title='Seguimiento de Soporte Alpina 2026';
  const BG='080F1E',CARD='111D35',CARD2='0D1628',BDR='1E2D4A',ACCENT='4F7CFF',TEXT='E8EDF7',MUTED='6B7FA8',DIM='4A5A7A',GREEN='38D9B0',FF='Calibri';

  function header(slide,title,sub,num,total){
    slide.background={color:BG};
    slide.addShape(pptx.ShapeType.rect,{x:0,y:0,w:'100%',h:0.85,fill:{color:CARD2},line:{color:BDR,pt:1}});
    slide.addShape(pptx.ShapeType.rect,{x:0,y:0,w:0.06,h:0.85,fill:{color:ACCENT}});
    slide.addText(title,{x:0.22,y:0.1,w:9.8,h:0.38,fontSize:13,bold:true,color:TEXT,fontFace:FF});
    slide.addText(sub,{x:0.22,y:0.5,w:9.8,h:0.26,fontSize:8.5,color:MUTED,fontFace:FF});
    if(num!==undefined) slide.addText(`${num} de ${total}`,{x:10.4,y:0.28,w:2.9,h:0.3,fontSize:9,color:DIM,fontFace:FF,align:'right'});
    slide.addShape(pptx.ShapeType.rect,{x:0,y:7.3,w:'100%',h:0.02,fill:{color:BDR}});
    slide.addText('2nv Automatización  ·  Alpina 2026',{x:0,y:7.33,w:'100%',h:0.22,fontSize:7.5,color:DIM,fontFace:FF,align:'center'});
  }
  function kpirow(slide,items){ items.forEach((k,i)=>{const x=0.28+i*3.35;
    slide.addShape(pptx.ShapeType.rect,{x,y:1.05,w:3.1,h:1.5,fill:{color:CARD},line:{color:BDR,pt:1}});
    slide.addShape(pptx.ShapeType.rect,{x,y:1.05,w:3.1,h:0.06,fill:{color:k.c}});
    slide.addText(String(k.v),{x,y:1.26,w:3.1,h:0.7,fontSize:28,bold:true,color:TEXT,fontFace:FF,align:'center'});
    slide.addText(k.l,{x,y:1.98,w:3.1,h:0.35,fontSize:8.5,color:MUTED,fontFace:FF,align:'center',bold:true});}); }

  // SLIDE RESUMEN
  const all=allCases();
  const totalHoras=Math.round(all.reduce((a,b)=>a+b.horas,0)*10)/10;
  const cerrados=all.filter(r=>{const x=(r.estado||'').toLowerCase();return x.startsWith('cerrado')||x==='ok';}).length;
  const s0=pptx.addSlide();
  header(s0,'SEGUIMIENTO DE SOPORTE · ALPINA','Resumen consolidado Enero – Julio 2026');
  kpirow(s0,[{l:'Total Casos',v:all.length,c:ACCENT},{l:'Horas Totales',v:totalHoras,c:GREEN},{l:'Resueltos',v:cerrados,c:'34D399'},{l:'Bots Soporte',v:BOTS_SOPORTE,c:'C084FC'}]);
  s0.addText('CONSOLIDADO POR MES',{x:0.28,y:2.8,w:12.8,h:0.28,fontSize:8,color:MUTED,fontFace:FF,bold:true});

  MESES.forEach(m=>{const r=getMes(m);const h=Math.round(r.reduce((a,b)=>a+b.horas,0)*10)/10;
    trr.push([{text:m,options:{color:TEXT,fontSize:9,fill:{color:CARD},bold:true,border:{pt:1,color:BDR}}},{text:String(r.length),options:{color:ACCENT,fontSize:9,fill:{color:CARD},bold:true,align:'center',border:{pt:1,color:BDR}}},{text:h+'h',options:{color:GREEN,fontSize:9,fill:{color:CARD},bold:true,align:'center',border:{pt:1,color:BDR}}},{text:r.length?(h/r.length).toFixed(1):'0',options:{color:MUTED,fontSize:9,fill:{color:CARD},align:'center',border:{pt:1,color:BDR}}}]);});
  s0.addTable(trr,{x:0.28,y:3.1,w:12.8,colW:[3.2,3.2,3.2,3.2],fontFace:FF,border:{pt:1,color:BDR}});

  // SLIDE POR MES
  for(const mes of MESES){
    const rows=getMes(mes); if(!rows.length)continue;
    const sm=pptx.addSlide();
    const h=Math.round(rows.reduce((a,b)=>a+b.horas,0)*10)/10;
    const cerr=rows.filter(r=>{const x=(r.estado||'').toLowerCase();return x.startsWith('cerrado')||x==='ok';}).length;
    header(sm,`${mes.toUpperCase()} 2026 · ALPINA`,`${rows.length} casos · ${h}h de soporte · ${cerr} resueltos`);
    kpirow(sm,[{l:'Casos',v:rows.length,c:ACCENT},{l:'Horas',v:h,c:GREEN},{l:'Resueltos',v:cerr,c:'34D399'},{l:'Abiertos',v:rows.filter(r=>(r.estado||'').toLowerCase().startsWith('abierto')).length,c:'F87171'}]);
    sm.addText('CASOS DEL MES',{x:0.28,y:2.75,w:12.8,h:0.25,fontSize:8,color:MUTED,fontFace:FF,bold:true});
    const th=[[{text:'#',options:{bold:true,color:MUTED,fontSize:7.5,fill:{color:'0A1525'},align:'center'}},{text:'Soporte',options:{bold:true,color:MUTED,fontSize:7.5,fill:{color:'0A1525'}}},{text:'Estado',options:{bold:true,color:MUTED,fontSize:7.5,fill:{color:'0A1525'}}},{text:'Descripción',options:{bold:true,color:MUTED,fontSize:7.5,fill:{color:'0A1525'}}},{text:'Hrs',options:{bold:true,color:MUTED,fontSize:7.5,fill:{color:'0A1525'},align:'center'}}]];

    sm.addTable(th,{x:0.28,y:3.02,w:12.8,colW:[0.5,3.5,1.8,6.1,0.9],fontFace:FF,border:{pt:1,color:BDR},autoPage:false});
    if(rows.length>22) sm.addText(`+ ${rows.length-22} casos adicionales (ver dashboard)`,{x:0.28,y:7.0,w:12.8,h:0.25,fontSize:8,color:DIM,fontFace:FF,italic:true,align:'center'});

    // Slide de Solicitudes Nuevas del mes
    const sols=SOLICITUDES[mes]||[];
    if(sols.length){
      const ss=pptx.addSlide();
      header(ss,`${mes.toUpperCase()} 2026 · SOLICITUDES NUEVAS`,`Solicitudes Nuevas a Realizar · ${sols.length} solicitudes`);
      const ts=[[{text:'#',options:{bold:true,color:MUTED,fontSize:8,fill:{color:'0A1525'},align:'center'}},{text:'Grupo',options:{bold:true,color:MUTED,fontSize:8,fill:{color:'0A1525'}}},{text:'Estado',options:{bold:true,color:MUTED,fontSize:8,fill:{color:'0A1525'}}},{text:'Descripción de la solicitud',options:{bold:true,color:MUTED,fontSize:8,fill:{color:'0A1525'}}}]];
      sols.slice(0,24).forEach((s,i)=>{ts.push([{text:String(i+1),options:{color:DIM,fontSize:7,fill:{color:CARD},align:'center'}},{text:(s.grupo||'—').slice(0,16),options:{color:'6B93FF',fontSize:7,fill:{color:CARD}}},{text:(s.estado||'—').slice(0,14),options:{color:MUTED,fontSize:7,fill:{color:CARD}}},{text:(s.desc||'').slice(0,110),options:{color:TEXT,fontSize:7,fill:{color:CARD}}}]);});
      ss.addText('SOLICITUDES NUEVAS A REALIZAR',{x:0.28,y:1.1,w:12.8,h:0.25,fontSize:8,color:MUTED,fontFace:FF,bold:true});
      ss.addTable(ts,{x:0.28,y:1.35,w:12.8,colW:[0.5,1.9,1.4,9.0],fontFace:FF,border:{pt:1,color:BDR},autoPage:false});
      if(sols.length>24) ss.addText(`+ ${sols.length-24} solicitudes adicionales (ver dashboard)`,{x:0.28,y:7.0,w:12.8,h:0.25,fontSize:8,color:DIM,fontFace:FF,italic:true,align:'center'});
    }
  }

  // SLIDE BOTS (categorizado)
  const sb=pptx.addSlide();
  const rN=BOTS.filter(b=>b.cat==='Rocketbot').length, peN=BOTS.filter(b=>b.cat==='Python entregados').length, prN=BOTS.filter(b=>b.cat==='Python por recibir').length;
  header(sb,'BOTS EN SOPORTE · 2NV','Inventario por categoría y estado de migración');
  kpirow(sb,[{l:'Total Bots',v:BOTS_SOPORTE,c:ACCENT},{l:'Rocketbot',v:rN,c:'4F7CFF'},{l:'Python entregados',v:peN,c:GREEN},{l:'Python por recibir',v:prN,c:'FBBF24'}]);
  const tb=[[{text:'Categoría',options:{bold:true,color:MUTED,fontSize:7.5,fill:{color:'0A1525'}}},{text:'Bot',options:{bold:true,color:MUTED,fontSize:7.5,fill:{color:'0A1525'}}},{text:'Observaciones / Estado de Migración',options:{bold:true,color:MUTED,fontSize:7.5,fill:{color:'0A1525'}}}]];
  BOT_CATS.forEach(cat=>{ BOTS.filter(b=>b.cat===cat).forEach(b=>{
    tb.push([{text:BOT_CAT_LABELS[cat].replace('Bots ',''),options:{color:'6B93FF',fontSize:6.5,fill:{color:CARD}}},{text:b.bot,options:{color:TEXT,fontSize:7,bold:true,fill:{color:CARD}}},{text:(b.estado||'—').slice(0,95),options:{color:MUTED,fontSize:6.5,fill:{color:CARD}}}]);
  });});
  sb.addText('INVENTARIO DE BOTS (19)',{x:0.28,y:2.7,w:12.8,h:0.22,fontSize:8,color:MUTED,fontFace:FF,bold:true});
  sb.addTable(tb,{x:0.28,y:2.94,w:12.8,colW:[2.6,2.4,7.8],fontFace:FF,border:{pt:1,color:BDR},autoPage:false});

  // SLIDE MAKRO — Observaciones actualización horas
  const smkO=pptx.addSlide();
  header(smkO,'PROYECTO MAKRO · ACTUALIZACIÓN DE HORAS','Reprogramación de 130 h a 150 h y nueva fecha de entrega');
  kpirow(smkO,[{l:'Horas anteriores',v:MAKRO.horasAnterior,c:'6B7FA8'},{l:'Horas actualizadas',v:MAKRO.horasActual,c:'FBBF24'},{l:'Entrega anterior',v:MAKRO.fechaEntregaAnterior,c:'6B7FA8'},{l:'Nueva entrega',v:MAKRO.fechaEntregaNueva,c:GREEN}]);
  smkO.addText('MOTIVO DEL AJUSTE',{x:0.28,y:2.75,w:12.8,h:0.25,fontSize:8,color:MUTED,fontFace:FF,bold:true});
  const obsText=MAKRO.observaciones.map(o=>'•  '+o).join('\n\n');
  smkO.addShape(pptx.ShapeType.rect,{x:0.28,y:3.05,w:12.8,h:3.6,fill:{color:CARD},line:{color:'FBBF24',pt:1}});
  smkO.addText(obsText,{x:0.5,y:3.25,w:12.4,h:3.2,fontSize:11,color:TEXT,fontFace:FF,wrap:true,valign:'top',lineSpacingMultiple:1.1});

  // SLIDE MAKRO — Sprints
  const smk=pptx.addSlide();
  const comp=SPRINTS.filter(s=>s.estado.includes('Completado')||s.estado.includes('✓')).length;
  const sgroups=[...new Set(SPRINTS.map(s=>s.sprint))];
  header(smk,'PROYECTO MAKRO · SPRINTS','Cronograma y avance del proyecto');
  kpirow(smk,[{l:'Actividades',v:SPRINTS.length,c:ACCENT},{l:'Horas Plan.',v:MAKRO.horasActual,c:'FBBF24'},{l:'Completadas',v:comp,c:'34D399'},{l:'Sprints',v:sgroups.length,c:'C084FC'}]);
  smk.addText('DETALLE DE SPRINTS',{x:0.28,y:2.75,w:12.8,h:0.25,fontSize:8,color:MUTED,fontFace:FF,bold:true});
  const tm=[[{text:'Sprint',options:{bold:true,color:MUTED,fontSize:7.5,fill:{color:'0A1525'}}},{text:'Fecha',options:{bold:true,color:MUTED,fontSize:7.5,fill:{color:'0A1525'}}},{text:'Actividad',options:{bold:true,color:MUTED,fontSize:7.5,fill:{color:'0A1525'}}},{text:'HU',options:{bold:true,color:MUTED,fontSize:7.5,fill:{color:'0A1525'}}},{text:'Hrs',options:{bold:true,color:MUTED,fontSize:7.5,fill:{color:'0A1525'},align:'center'}},{text:'Estado',options:{bold:true,color:MUTED,fontSize:7.5,fill:{color:'0A1525'}}}]];
  SPRINTS.slice(0,24).forEach(s=>{tm.push([{text:s.sprint,options:{color:'6B93FF',fontSize:7,bold:true,fill:{color:CARD}}},{text:s.fecha,options:{color:MUTED,fontSize:7,fill:{color:CARD}}},{text:s.actividad.slice(0,30),options:{color:TEXT,fontSize:7,fill:{color:CARD}}},{text:s.hu,options:{color:MUTED,fontSize:7,fill:{color:CARD}}},{text:s.horas+'h',options:{color:GREEN,fontSize:7,bold:true,fill:{color:CARD},align:'center'}},{text:s.estado.slice(0,16),options:{color:s.estado.includes('Completado')||s.estado.includes('✓')?'34D399':'60A5FA',fontSize:7,fill:{color:CARD}}}]);});
  smk.addTable(tm,{x:0.28,y:3.02,w:12.8,colW:[1.6,1.6,4.0,1.2,1.0,3.4],fontFace:FF,border:{pt:1,color:BDR},autoPage:false});

  await pptx.writeFile({ fileName:'Seguimiento_Soporte_Alpina_2026.pptx' });
}
